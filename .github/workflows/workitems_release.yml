name: Work Items Release

on:
  push:
    tags:
      - "robocorp-workitems-*"
    branches:
      - test-workitems-workflow

defaults:
  run:
    working-directory: './workitems'

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true

    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install devutils
      run: python -m pip install -r ../devutils/requirements.txt

    - name: Install project
      run: inv install

    - name: Check tag version
      run: inv check-tag-version

    - name: Build with poetry
      run: inv build

    # - name: Upload to PyPI
    #   run: inv publish -t ${{ secrets.PYPI_TOKEN_ROBOCORP_WORKITEMS }}
